<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para Aline ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 50%, #16213e 100%);
            overflow: hidden;
            color: white;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .spotify-bg-green {
            background-color: #1DB954;
        }

        .spotify-text-green {
            color: #1DB954 !important;
            opacity: 1 !important;
        }

        .btn-inactive {
            color: rgba(255, 255, 255, 0.4) !important;
        }

        .glass-panel {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 95dvh;
            height: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (max-height: 700px) {
            .glass-panel {
                max-height: 98dvh;
            }
        }

        .photo-slide {
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        .photo-slide.active {
            opacity: 1;
            transform: scale(1);
            z-index: 1;
        }

        .photo-slide.inactive {
            opacity: 0;
            transform: scale(1.05);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .photo-indicator {
            transition: all 0.3s ease;
            height: 3px;
            min-height: 3px;
        }

        .photo-indicator.active {
            background-color: #1DB954;
            width: 24px;
            flex: 0 0 24px;
        }

        .heart-pulse {
            color: #ff4d4d !important;
            fill: #ff4d4d !important;
            animation: pulse-red 1.2s infinite;
        }

        @keyframes pulse-red {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        .audio-visualizer {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 16px;
        }

        .bar {
            width: 3px;
            background-color: #1DB954;
            border-radius: 2px;
            animation: bounce 0.8s ease-in-out infinite;
            animation-play-state: paused;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: scaleY(0.3);
            }

            50% {
                transform: scaleY(1);
            }
        }

        #lyricsContainer {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #1DB954 transparent;
        }

        #lyricsContainer::-webkit-scrollbar {
            width: 4px;
        }

        #lyricsContainer::-webkit-scrollbar-thumb {
            background-color: #1DB954;
            border-radius: 4px;
        }

        #welcomeCover {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }

        #welcomeCover.hidden-cover {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .polaroid-frame {
            background: white;
            padding: 12px 12px 40px 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            transform: rotate(-3deg);
            width: 85%;
            max-width: 280px;
            transition: transform 0.3s ease;
        }

        @media (min-width: 768px) {
            .polaroid-frame {
                max-width: 320px;
                padding: 15px 15px 50px 15px;
            }
        }

        .polaroid-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border: 1px solid #ddd;
            display: block;
        }

        .polaroid-caption {
            font-family: 'Courier New', Courier, monospace;
            color: #333;
            text-align: center;
            font-weight: bold;
            font-size: 0.875rem;
            margin-top: 12px;
            line-height: 1.4;
        }

        /* Touch-friendly adjustments */
        .touch-target {
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 380px) {
            .glass-panel {
                border-radius: 24px;
            }

            .polaroid-caption {
                font-size: 0.75rem;
            }
        }

        /* Prevent text selection for better app-like feel */
        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>

<body class="p-2 sm:p-4">
    <div id="welcomeCover">
        <div class="w-full flex flex-col items-center p-4">
            <div class="polaroid-frame mb-6 sm:mb-8">
                <img src="upload/capa.png" class="polaroid-image" alt="Capa">
                <p class="polaroid-caption">Nosso primeiro dia dos namorados de muitos ❤️</p>
            </div>
            <button id="startBtn"
                class="spotify-bg-green text-black font-bold py-4 px-8 sm:px-10 rounded-full text-base sm:text-lg shadow-xl active:scale-95 transition transform touch-target">
                Iniciar nossa história
            </button>
        </div>
    </div>

    <div class="w-full max-w-md glass-panel rounded-3xl overflow-hidden h-auto">
        <!-- Header -->
        <div class="p-3 sm:p-4 pb-2 flex-shrink-0">
            <div class="flex gap-1.5 mb-3 sm:mb-4" id="photoIndicators"></div>
            <div
                class="flex items-center justify-center gap-4 text-white/60 text-[10px] sm:text-xs uppercase tracking-wider font-medium mb-1 sm:mb-2 no-select">
                <span>Aline</span>
                <i data-lucide="heart" class="heart-pulse w-4 h-4"></i>
                <span>Weverton</span>
            </div>
        </div>

        <!-- Photo Container -->
        <div class="px-4 sm:px-6 relative w-full flex-shrink-0">
            <div class="relative w-full aspect-square max-h-[45vh] sm:max-h-[50vh] rounded-2xl overflow-hidden shadow-2xl bg-black/40"
                id="photoContainer">
                <!-- Slides will be inserted here -->
            </div>

            <!-- Audio Visualizer Badge -->
            <div
                class="absolute top-3 right-8 sm:right-10 bg-black/60 backdrop-blur-md rounded-full px-3 sm:px-4 py-1.5 sm:py-2 flex items-center justify-center z-10">
                <div class="audio-visualizer" id="miniVisualizer">
                    <div class="bar" style="height: 6px; animation-delay: 0.1s;"></div>
                    <div class="bar" style="height: 12px; animation-delay: 0.3s;"></div>
                    <div class="bar" style="height: 16px; animation-delay: 0.5s;"></div>
                    <div class="bar" style="height: 10px; animation-delay: 0.2s;"></div>
                    <div class="bar" style="height: 14px; animation-delay: 0.4s;"></div>
                </div>
            </div>
        </div>

        <!-- Lyrics Container -->
        <div class="px-4 sm:px-6 pt-2 sm:pt-3 pb-2 sm:pb-3 flex-grow overflow-hidden min-h-[80px] max-h-[25vh]">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-3 sm:p-4 h-full" id="lyricsContainer">
                <p class="text-white/90 text-xs sm:text-sm leading-relaxed font-medium transition-opacity duration-300"
                    id="longMessageText"></p>
            </div>
        </div>

        <div class="px-4 sm:px-6 pt-1 sm:pt-2 pb-1 flex-shrink-0 no-select">
            <h2 class="text-white text-lg sm:text-xl lg:text-2xl font-bold mb-0.5 truncate">Trevo (Tu)</h2>
            <p class="text-white/60 text-xs sm:text-sm font-medium">Anavitória part. Tiago Iorc</p>
        </div>

        <!-- Progress Bar -->
        <div class="px-6 py-2 flex-shrink-0">
            <div class="w-full h-1.5 bg-white/20 rounded-full mb-2 cursor-pointer relative group"
                id="progressBarContainer">
                <div class="absolute inset-y-0 left-0 spotify-bg-green rounded-full pointer-events-none"
                    id="musicProgress" style="width: 0%"></div>
                <div class="absolute top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"
                    id="progressHandle" style="left: 0%"></div>
            </div>
            <div class="flex justify-between text-[10px] text-white/50">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="px-4 sm:px-6 pb-4 sm:pb-6 pt-1 flex-shrink-0">
            <div class="flex items-center justify-between gap-2">
                <button id="muteBtn"
                    class="spotify-text-green transition duration-300 hover:scale-110 touch-target p-2">
                    <i data-lucide="volume-2" id="muteIcon" class="w-5 h-5 sm:w-6 sm:h-6"></i>
                </button>

                <button class="text-white hover:scale-110 transition touch-target p-2" id="prevBtn">
                    <i data-lucide="skip-back" class="w-6 h-6 sm:w-7 sm:h-7 fill-current"></i>
                </button>

                <button
                    class="spotify-bg-green text-black rounded-full w-12 h-12 sm:w-14 sm:h-14 flex items-center justify-center shadow-lg transition active:scale-90 touch-target mx-2"
                    id="playPauseBtn">
                    <div id="playIconContainer">
                        <i data-lucide="play" class="w-6 h-6 sm:w-7 sm:h-7 fill-current ml-0.5"></i>
                    </div>
                    <div id="pauseIconContainer" class="hidden">
                        <i data-lucide="pause" class="w-6 h-6 sm:w-7 sm:h-7 fill-current"></i>
                    </div>
                </button>

                <button class="text-white hover:scale-110 transition touch-target p-2" id="nextBtn">
                    <i data-lucide="skip-forward" class="w-6 h-6 sm:w-7 sm:h-7 fill-current"></i>
                </button>

                <button class="spotify-text-green transition duration-300 touch-target p-2" id="repeatBtn">
                    <i data-lucide="repeat" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                </button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata" loop playsinline webkit-playsinline>
        <source src="upload/musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        const TIME_PER_PHOTO = 15;
        const photos = [
            { url: 'upload/foto1.png', short: 'AMOR E PASTEL 🥟', long: 'No meio do movimento da feira, o meu mundo para quando olho para você.' },
            { url: 'upload/foto2.png', short: 'SABOR DE FELICIDADE ☕', long: 'Nada como um café quentinho, o aroma de grãos torrados e a sua companhia para aquecer o coração.' },
            { url: 'upload/foto3.png', short: 'PIPOCA, FILME E VOCÊ 🍿', long: 'De todos os filmes que já vi, a nossa história de amor é a que eu nunca canso de dar replay.' },
            { url: 'upload/foto4.png', short: 'TORCIDA DE DOIS 🏟️', long: 'Não importa o placar, com você ao meu lado eu sempre saio ganhando.' },
            { url: 'upload/foto5.png', short: 'MINHA MELHOR MOTIVAÇÃO 💪', long: 'O treino rende muito mais quando o descanso entre as séries é com o seu sorriso.' },
            { url: 'upload/foto6.png', short: 'NOITE DE LUZ E AMOR 🕯️', long: 'O cenário é lindo, a comida está ótima, mas nada brilha mais do que o seu olhar nesta noite.' },
            { url: 'upload/foto7.png', short: 'ONDE MEU CORAÇÃO DESCANSA 🏠', long: 'Não importa o endereço, o meu lugar favorito no mundo vai ser sempre onde você estiver.' },
            { url: 'upload/foto8.png', short: 'TEMPERANDO A VIDA JUNTOS 🧂', long: 'Misturando sonhos, cozinhando planos e saboreando cada segundo ao seu lado.' },
            { url: 'upload/foto9.png', short: 'SINTONIA EM CADA PASSO 🎵', long: 'Não importa o ritmo, contanto que seja você conduzindo o meu coração.' },
            { url: 'upload/foto10.png', short: 'PARA TODO O SEMPRE ♾️', long: 'Prometo te escolher hoje, amanhã e em cada segundo da eternidade que nos espera.' }
        ];

        let currentPhotoIndex = 0;
        let autoSlideTimer;
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIconContainer');
        const pauseIcon = document.getElementById('pauseIconContainer');
        const muteBtn = document.getElementById('muteBtn');
        const musicProgress = document.getElementById('musicProgress');
        const progressHandle = document.getElementById('progressHandle');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const longMessageText = document.getElementById('longMessageText');
        const progressBar = document.getElementById('progressBarContainer');
        const repeatBtn = document.getElementById('repeatBtn');
        const welcomeCover = document.getElementById('welcomeCover');
        const startBtn = document.getElementById('startBtn');

        function init() {
            const container = document.getElementById('photoContainer');
            const indicators = document.getElementById('photoIndicators');

            photos.forEach((p, i) => {
                const slide = document.createElement('div');
                slide.className = `photo-slide absolute inset-0 w-full h-full ${i === 0 ? 'active' : 'inactive'}`;
                slide.innerHTML = `
                    <img src="${p.url}" class="w-full h-full object-cover" alt="${p.short}" loading="${i === 0 ? 'eager' : 'lazy'}">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent p-3 sm:p-4">
                        <p class="text-white text-[10px] sm:text-xs font-bold uppercase tracking-widest truncate">${p.short}</p>
                    </div>
                `;
                container.appendChild(slide);

                const ind = document.createElement('div');
                ind.className = `photo-indicator bg-white/30 rounded-full flex-1 ${i === 0 ? 'active' : ''}`;
                indicators.appendChild(ind);
            });

            longMessageText.innerText = photos[0].long;
            lucide.createIcons();

            if (photos.length > 1) {
                const img = new Image();
                img.src = photos[1].url;
            }
        }

        function updateUI() {
            const slides = document.querySelectorAll('.photo-slide');
            const inds = document.querySelectorAll('.photo-indicator');

            slides.forEach((s, i) => {
                s.className = `photo-slide absolute inset-0 w-full h-full ${i === currentPhotoIndex ? 'active' : 'inactive'}`;
            });

            inds.forEach((n, i) => {
                n.className = `photo-indicator bg-white/30 rounded-full flex-1 ${i === currentPhotoIndex ? 'active' : ''}`;
            });

            const nextIndex = (currentPhotoIndex + 1) % photos.length;
            const img = new Image();
            img.src = photos[nextIndex].url;

            longMessageText.style.opacity = 0;
            setTimeout(() => {
                longMessageText.innerText = photos[currentPhotoIndex].long;
                longMessageText.style.opacity = 1;
                document.getElementById('lyricsContainer').scrollTop = 0;
            }, 300);
        }

        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            updateUI();
            resetAutoSlide();
        }

        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            updateUI();
            resetAutoSlide();
        }

        function resetAutoSlide() {
            clearInterval(autoSlideTimer);
            autoSlideTimer = setInterval(nextPhoto, TIME_PER_PHOTO * 1000);
        }

        function togglePlay() {
            const bars = document.querySelectorAll('.bar');
            if (audio.paused) {
                audio.play().catch(e => console.log('Audio play failed:', e));
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                bars.forEach(bar => bar.style.animationPlayState = 'running');
            } else {
                audio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                bars.forEach(bar => bar.style.animationPlayState = 'paused');
            }
        }

        let touchStartX = 0;
        let touchEndX = 0;
        const photoContainer = document.getElementById('photoContainer');

        photoContainer.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        photoContainer.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchStartX - touchEndX > swipeThreshold) {
                nextPhoto();
            }
            if (touchEndX - touchStartX > swipeThreshold) {
                prevPhoto();
            }
        }

        muteBtn.onclick = () => {
            audio.muted = !audio.muted;
            const iconElement = document.getElementById('muteIcon');
            if (audio.muted) {
                iconElement.setAttribute('data-lucide', 'volume-off');
                muteBtn.classList.remove('spotify-text-green');
                muteBtn.classList.add('btn-inactive');
            } else {
                iconElement.setAttribute('data-lucide', 'volume-2');
                muteBtn.classList.add('spotify-text-green');
                muteBtn.classList.remove('btn-inactive');
            }
            lucide.createIcons();
        };

        startBtn.onclick = () => {
            welcomeCover.classList.add('hidden-cover');
            togglePlay();
            resetAutoSlide();
        };

        playPauseBtn.onclick = togglePlay;

        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            const p = (audio.currentTime / audio.duration) * 100;
            musicProgress.style.width = p + '%';
            progressHandle.style.left = p + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        };

        document.getElementById('nextBtn').onclick = nextPhoto;
        document.getElementById('prevBtn').onclick = prevPhoto;

        function updateProgressFromTouch(clientX) {
            if (!audio.duration) return;
            const rect = progressBar.getBoundingClientRect();
            const percentage = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            audio.currentTime = percentage * audio.duration;
        }

        progressBar.addEventListener('touchstart', (e) => {
            updateProgressFromTouch(e.touches[0].clientX);
        }, { passive: true });

        progressBar.addEventListener('touchmove', (e) => {
            e.preventDefault();
            updateProgressFromTouch(e.touches[0].clientX);
        }, { passive: false });

        progressBar.onclick = (e) => {
            if (!audio.duration) return;
            const percentage = (e.clientX - progressBar.getBoundingClientRect().left) / progressBar.offsetWidth;
            audio.currentTime = percentage * audio.duration;
        };

        repeatBtn.onclick = () => {
            audio.loop = !audio.loop;
            if (audio.loop) {
                repeatBtn.classList.add('spotify-text-green');
                repeatBtn.classList.remove('btn-inactive');
            } else {
                repeatBtn.classList.remove('spotify-text-green');
                repeatBtn.classList.add('btn-inactive');
            }
        };

        audio.onended = () => {
            if (!audio.loop) {
                const bars = document.querySelectorAll('.bar');
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                bars.forEach(bar => bar.style.animationPlayState = 'paused');
            }
        };

        audio.onloadedmetadata = () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        };

        function formatTime(s) {
            if (isNaN(s)) return '0:00';
            return Math.floor(s / 60) + ":" + Math.floor(s % 60).toString().padStart(2, '0');
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
            }
        });

        init();
    </script>
</body>

</html>
