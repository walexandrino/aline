<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Para Aline ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 50%, #16213e 100%);
            overflow: hidden;
            color: white;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .spotify-bg-green {
            background-color: #1DB954;
        }

        .spotify-text-green {
            color: #1DB954 !important;
        }

        .btn-inactive {
            color: rgba(255, 255, 255, 0.4) !important;
        }

        .glass-panel {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 92%;
            max-width: 380px;
            height: 90dvh;
            /* Altura fixa para não quebrar no S24 */
            display: flex;
            flex-direction: column;
            border-radius: 2rem;
        }

        .photo-slide {
            transition: opacity 0.8s ease-in-out;
        }

        .photo-slide.active {
            opacity: 1;
            z-index: 1;
        }

        .photo-slide.inactive {
            opacity: 0;
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .photo-indicator {
            transition: all 0.3s ease;
        }

        .photo-indicator.active {
            background-color: #1DB954;
            width: 24px;
        }

        .heart-pulse {
            color: #ff4d4d !important;
            fill: #ff4d4d !important;
            animation: pulse-red 1.2s infinite;
        }

        @keyframes pulse-red {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .audio-visualizer {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 18px;
        }

        .bar {
            width: 3px;
            background-color: #1DB954;
            border-radius: 2px;
            animation: bounce 0.8s ease-in-out infinite;
            animation-play-state: paused;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: scaleY(0.4);
            }

            50% {
                transform: scaleY(1);
            }
        }

        /* AJUSTE CHAVE: Faz a foto encolher se o texto precisar de espaço */
        .photo-container-wrapper {
            flex: 0 1 320px;
            /* A foto tenta ter 320px, mas encolhe se necessário */
            min-height: 200px;
            position: relative;
        }

        #lyricsContainer {
            flex: 1 1 auto;
            /* A mensagem ocupa o resto do espaço */
            overflow-y: auto;
            min-height: 80px;
            /* Garante que a mensagem sempre apareça */
        }

        #welcomeCover {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .polaroid-frame {
            background: white;
            padding: 12px 12px 45px 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-radius: 2px;
            transform: rotate(-3deg);
            width: 80%;
            max-width: 260px;
        }
    </style>
</head>

<body class="p-4">

    <div id="welcomeCover">
        <div class="w-full flex flex-col items-center p-4">
            <div class="polaroid-frame mb-8">
                <img src="upload/capa.png" class="w-full aspect-square object-cover border">
                <p class="font-mono text-gray-800 text-center font-bold text-xs mt-4">Nossa história ❤️</p>
            </div>
            <button id="startBtn"
                class="spotify-bg-green text-black font-bold py-3 px-8 rounded-full text-lg shadow-xl active:scale-95 transition">
                Iniciar nossa história
            </button>
        </div>
    </div>

    <div class="glass-panel overflow-hidden">
        <div class="p-4 pb-2 flex-shrink-0">
            <div class="flex gap-1.5 mb-3" id="photoIndicators"></div>
            <div
                class="flex items-center justify-center gap-4 text-white/50 text-[10px] uppercase tracking-widest font-bold">
                <span>Aline</span>
                <i data-lucide="heart" class="heart-pulse w-3 h-3"></i>
                <span>Weverton</span>
            </div>
        </div>

        <div class="px-5 photo-container-wrapper">
            <div class="w-full h-full rounded-2xl overflow-hidden shadow-2xl bg-black/40 relative" id="photoContainer">
            </div>
            <div class="absolute top-3 right-8 bg-black/60 backdrop-blur-md rounded-full px-4 py-1.5 z-10">
                <div class="audio-visualizer">
                    <div class="bar" style="height: 6px; animation-delay: 0.1s;"></div>
                    <div class="bar" style="height: 12px; animation-delay: 0.3s;"></div>
                    <div class="bar" style="height: 10px; animation-delay: 0.5s;"></div>
                </div>
            </div>
        </div>

        <div class="px-5 mt-4 flex-grow overflow-hidden">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-4 h-full flex flex-col">
                <div id="lyricsContainer">
                    <p class="text-white/90 text-sm leading-relaxed font-medium" id="longMessageText"></p>
                </div>
            </div>
        </div>

        <div class="px-6 pt-3 flex-shrink-0">
            <h2 class="text-white text-lg font-bold truncate">Trevo (Tu)</h2>
            <p class="text-white/50 text-xs font-medium">Anavitória part. Tiago Iorc</p>
        </div>

        <div class="px-6 py-3 flex-shrink-0">
            <div class="w-full h-1 bg-white/10 rounded-full mb-1.5 relative" id="progressBarContainer">
                <div class="absolute inset-y-0 left-0 spotify-bg-green rounded-full" id="musicProgress"
                    style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-[10px] text-white/40 font-mono">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="px-6 pb-6 flex-shrink-0">
            <div class="flex items-center justify-between">
                <button id="muteBtn" class="spotify-text-green"><i data-lucide="volume-2" class="w-5 h-5"></i></button>
                <div class="flex items-center gap-6">
                    <button id="prevBtn" class="text-white"><i data-lucide="skip-back"
                            class="w-7 h-7 fill-current"></i></button>
                    <button id="playPauseBtn"
                        class="spotify-bg-green text-black rounded-full w-14 h-14 flex items-center justify-center shadow-lg">
                        <div id="playIconContainer"><i data-lucide="play" class="w-6 h-6 fill-current ml-1"></i></div>
                        <div id="pauseIconContainer" class="hidden"><i data-lucide="pause"
                                class="w-6 h-6 fill-current"></i></div>
                    </button>
                    <button id="nextBtn" class="text-white"><i data-lucide="skip-forward"
                            class="w-7 h-7 fill-current"></i></button>
                </div>
                <button id="repeatBtn" class="spotify-text-green"><i data-lucide="repeat" class="w-4 h-4"></i></button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata" loop playsinline>
        <source src="upload/musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        const photos = [
            { url: 'upload/foto1.png', short: 'AMOR E PASTEL 🥟', long: 'No meio do movimento da feira, o meu mundo para quando olho para você.' },
            { url: 'upload/foto2.png', short: 'SABOR DE FELICIDADE ☕', long: 'Nada como um café quentinho, o aroma de grãos torrados e a sua companhia para aquecer o coração.' },
            { url: 'upload/foto3.png', short: 'PIPOCA, FILME E VOCÊ 🍿', long: 'De todos os filmes que já vi, a nossa história de amor é a que eu nunca canso de dar replay.' },
            { url: 'upload/foto4.png', short: 'TORCIDA DE DOIS 🏟️', long: 'Não importa o placar, com você ao meu lado eu sempre saio ganhando.' },
            { url: 'upload/foto5.png', short: 'MINHA MELHOR MOTIVAÇÃO 💪', long: 'O treino rende muito mais quando o descanso entre as séries é com o seu sorriso.' },
            { url: 'upload/foto6.png', short: 'NOITE DE LUZ E AMOR 🕯️', long: 'O cenário é lindo, a comida está ótima, mas nada brilha mais do que o seu olhar nesta noite.' },
            { url: 'upload/foto7.png', short: 'ONDE MEU CORAÇÃO DESCANSA 🏠', long: 'Não importa o endereço, o meu lugar favorito no mundo vai ser sempre onde você estiver.' },
            { url: 'upload/foto8.png', short: 'TEMPERANDO A VIDA JUNTOS 🧂', long: 'Misturando sonhos, cozinhando planos e saboreando cada segundo ao seu lado.' },
            { url: 'upload/foto9.png', short: 'SINTONIA EM CADA PASSO 🎵', long: 'Não importa o ritmo, contanto que seja você conduzindo o meu coração.' },
            { url: 'upload/foto10.png', short: 'PARA TODO O SEMPRE ♾️', long: 'Prometo te escolher hoje, amanhã e em cada segundo da eternidade que nos espera.' }
        ];

        let currentPhotoIndex = 0;
        let autoSlideTimer;
        const audio = document.getElementById('audioPlayer');

        function init() {
            const container = document.getElementById('photoContainer');
            const indicators = document.getElementById('photoIndicators');
            photos.forEach((p, i) => {
                const slide = document.createElement('div');
                slide.className = `photo-slide absolute inset-0 w-full h-full ${i === 0 ? 'active' : 'inactive'}`;
                slide.innerHTML = `<img src="${p.url}" class="w-full h-full object-cover"><div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-4"><p class="text-white text-[10px] font-bold uppercase tracking-widest">${p.short}</p></div>`;
                container.appendChild(slide);
                const ind = document.createElement('div');
                ind.className = `photo-indicator h-1 bg-white/20 rounded-full flex-1 ${i === 0 ? 'active' : ''}`;
                indicators.appendChild(ind);
            });
            document.getElementById('longMessageText').innerText = photos[0].long;
            lucide.createIcons();
        }

        function updateUI() {
            document.querySelectorAll('.photo-slide').forEach((s, i) => s.className = `photo-slide absolute inset-0 w-full h-full ${i === currentPhotoIndex ? 'active' : 'inactive'}`);
            document.querySelectorAll('.photo-indicator').forEach((n, i) => n.classList.toggle('active', i === currentPhotoIndex));
            document.getElementById('longMessageText').innerText = photos[currentPhotoIndex].long;
        }

        function nextPhoto() { currentPhotoIndex = (currentPhotoIndex + 1) % photos.length; updateUI(); resetAutoSlide(); }
        function prevPhoto() { currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length; updateUI(); resetAutoSlide(); }
        function resetAutoSlide() { clearInterval(autoSlideTimer); autoSlideTimer = setInterval(nextPhoto, 15000); }

        startBtn.onclick = () => {
            document.getElementById('welcomeCover').style.opacity = '0';
            setTimeout(() => document.getElementById('welcomeCover').remove(), 1000);
            audio.play();
            document.getElementById('playIconContainer').classList.add('hidden');
            document.getElementById('pauseIconContainer').classList.remove('hidden');
            document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = 'running');
            resetAutoSlide();
        };

        document.getElementById('playPauseBtn').onclick = () => {
            if (audio.paused) { audio.play(); } else { audio.pause(); }
            document.getElementById('playIconContainer').classList.toggle('hidden');
            document.getElementById('pauseIconContainer').classList.toggle('hidden');
            document.querySelectorAll('.bar').forEach(b => b.style.animationPlayState = audio.paused ? 'paused' : 'running');
        };

        document.getElementById('nextBtn').onclick = nextPhoto;
        document.getElementById('prevBtn').onclick = prevPhoto;
        audio.ontimeupdate = () => {
            document.getElementById('musicProgress').style.width = (audio.currentTime / audio.duration) * 100 + '%';
            document.getElementById('currentTime').textContent = Math.floor(audio.currentTime / 60) + ":" + Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
        };
        audio.onloadedmetadata = () => document.getElementById('totalTime').textContent = Math.floor(audio.duration / 60) + ":" + Math.floor(audio.duration % 60).toString().padStart(2, '0');

        init();
    </script>
</body>

</html>
